[tool.poetry]
name = "languine"
version = "0.1.0"
description = "Backend for Languine App"
authors = [
    "Marwa Khafagy", 
    "Selina Kim", 
    "Giovanna Gerada", 
    "Stella Gu", 
    "Tinu Joseph"]
license = "MIT"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11.0"
flask = "^3.1.2"
pydantic = "^2.12.2"
