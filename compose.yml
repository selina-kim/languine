# --- Backend Service ---
  backend:
    build: ./backend
    env_file: .env
    networks:
      - back-tier
    restart: unless-stopped
    # this is temporary,
    ports:
      # Local dev access: http://<server-ip>:8080
      - "8080:5000"
    # environment:
    #   - DATABASE_URL=postgresql://postgres:secure_password@db:5432/private_storage
    #   - NODE_ENV=production
    # below 4 configs allows file changes to be applied without rebuilding the image
    volumes:
      - ./backend:/app
      - /app/.venv  # preserve the container's .venv
    environment:
      FLASK_APP: main:app
      FLASK_ENV: development
      MW_DICT_API_KEY: ${MW_DICT_API_KEY}
      DEEPL_API_KEY: ${DEEPL_API_KEY}
      PYTHONPATH: /app/src
      COQUI_TOS_AGREED: "1"

      # --- DB connection (SQLAlchemy style; adjust in code if needed) ---
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/languine"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      MINIO_BUCKET_NAME: "languine-media"
    
    working_dir: /app
    command: flask run --host=0.0.0.0 --reload

    depends_on:
      - db
      - minio

  # --- PostgreSQL Database Service ---
  db:
    image: postgres:15
    container_name: languine_db
    networks:
      - back-tier
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "languine"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    ports:
      # optional only for local dev access
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

# --- MinIO Service (Image storage) ---
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    networks:
      - back-tier
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
      - minio-data:/data
    ports:
      # 9000 for API, 9001 for console
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

# --- Cloudflared Tunnel Service ---
  cloudflared:
    profiles: ["production"]  # Only runs when profile is specified: "docker compose --profile production up"
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    # This uses a named tunnel with a token created in the Cloudflare dashboard
    command: tunnel run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TUNNEL_TOKEN}"
    networks:
      - back-tier
    restart: unless-stopped
    # no ports needed as traffic is routed via Cloudflare


networks:
  front-tier: {}
  back-tier: {}

# TODO: for persistant storage volumes
volumes:
  postgres-data:
